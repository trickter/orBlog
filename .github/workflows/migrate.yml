name: Apply Prisma Migrations

on:
  workflow_dispatch:

concurrency:
  group: production-schema-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '20'
      SERVER_PATH: /app/ai-code/brainstorm
      MIGRATION_ARCHIVE: orblog-migrations.tgz
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      SERVER_USER: ${{ secrets.SERVER_USER }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Prepare migration archive
        shell: bash
        run: |
          set -euo pipefail

          tar \
            -czf "${RUNNER_TEMP}/${MIGRATION_ARCHIVE}" \
            package.json \
            package-lock.json \
            prisma

      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail

          install -m 700 -d ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SERVER_PORT}" -H "${SERVER_HOST}" >> ~/.ssh/known_hosts

      - name: Upload migration archive
        shell: bash
        run: |
          set -euo pipefail

          scp \
            -i ~/.ssh/deploy_key \
            -P "${SERVER_PORT}" \
            "${RUNNER_TEMP}/${MIGRATION_ARCHIVE}" \
            "${SERVER_USER}@${SERVER_HOST}:/tmp/${MIGRATION_ARCHIVE}"

      - name: Apply migrations on server
        shell: bash
        run: |
          set -euo pipefail

          ssh \
            -i ~/.ssh/deploy_key \
            -p "${SERVER_PORT}" \
            "${SERVER_USER}@${SERVER_HOST}" \
            "bash -s -- '${SERVER_PATH}' '/tmp/${MIGRATION_ARCHIVE}'" \
            < scripts/migrate-remote.sh
