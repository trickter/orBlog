name: Deploy To Server

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '20'
      SERVER_PATH: /app/ai-code/brainstorm
      SYSTEMD_SERVICE: brainstorm.service
      RELEASE_ARCHIVE: orblog-release.tgz
      RELEASE_ID: ${{ github.sha }}
      DATABASE_URL: file:./ci.db
      ADMIN_SECRET: ci-admin-secret
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      SERVER_USER: ${{ secrets.SERVER_USER }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare CI database
        run: npx prisma migrate deploy

      - name: Capture CI database
        shell: bash
        run: |
          set -euo pipefail

          CI_DB_PATH=""

          if [ -f "prisma/ci.db" ]; then
            CI_DB_PATH="prisma/ci.db"
          elif [ -f "ci.db" ]; then
            CI_DB_PATH="ci.db"
          else
            echo "Unable to locate ci.db after prisma migrate deploy" >&2
            find . -maxdepth 3 -name 'ci.db' -print || true
            exit 1
          fi

          mkdir -p "${RUNNER_TEMP}/ci-data"
          cp "${CI_DB_PATH}" "${RUNNER_TEMP}/ci-data/dev.db"

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --runInBand

      - name: Build application
        run: npm run build

      - name: Assemble release bundle
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_DIR="${RUNNER_TEMP}/release"

          rm -rf "${RELEASE_DIR}"
          mkdir -p "${RELEASE_DIR}" "${RELEASE_DIR}/.next" "${RELEASE_DIR}/prisma"

          tar -C .next/standalone -cf - . | tar -C "${RELEASE_DIR}" -xf -
          tar -C .next -cf - static | tar -C "${RELEASE_DIR}/.next" -xf -
          tar -C . -cf - public | tar -C "${RELEASE_DIR}" -xf -
          tar -C prisma -cf - schema.prisma migrations | tar -C "${RELEASE_DIR}/prisma" -xf -
          rm -f \
            "${RELEASE_DIR}/.env" \
            "${RELEASE_DIR}/.env.local" \
            "${RELEASE_DIR}/.env.production" \
            "${RELEASE_DIR}/.env.production.local"
          printf '%s\n' "${RELEASE_ID}" > "${RELEASE_DIR}/REVISION"

      - name: Smoke test standalone bundle
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_DIR="${RUNNER_TEMP}/release"

          cp "${RUNNER_TEMP}/ci-data/dev.db" "${RELEASE_DIR}/prisma/dev.db"

          pushd "${RELEASE_DIR}" > /dev/null
          echo "Smoke test working directory: $(pwd)"
          test -f "server.js"
          test -f "prisma/dev.db"
          test -f "prisma/schema.prisma"
          ls -la
          ls -la prisma
          find . -maxdepth 2 -type f | sort

          cleanup() {
            if [ -n "${SERVER_PID:-}" ]; then
              kill "${SERVER_PID}" 2>/dev/null || true
              wait "${SERVER_PID}" 2>/dev/null || true
            fi
          }

          trap cleanup EXIT

          DATABASE_URL=file:./dev.db \
          ADMIN_SECRET="${ADMIN_SECRET}" \
          HOSTNAME=127.0.0.1 \
          PORT=3001 \
          node server.js > server.log 2>&1 &
          SERVER_PID=$!

          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3001/admin/login > /dev/null; then
              break
            fi
            if ! kill -0 "${SERVER_PID}" 2>/dev/null; then
              cat server.log
              exit 1
            fi
            sleep 1
          done

          if ! curl --fail --silent http://127.0.0.1:3001/admin/login > /dev/null; then
            cat server.log
            exit 1
          fi

          cleanup
          trap - EXIT
          popd > /dev/null

          rm -f "${RELEASE_DIR}/prisma/dev.db"

      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail

          install -m 700 -d ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SERVER_PORT}" -H "${SERVER_HOST}" >> ~/.ssh/known_hosts

      - name: Create release archive
        shell: bash
        run: |
          set -euo pipefail

          tar -C "${RUNNER_TEMP}/release" -czf "${RUNNER_TEMP}/${RELEASE_ARCHIVE}" .

      - name: Show release archive info
        shell: bash
        run: |
          set -euo pipefail

          ls -lh "${RUNNER_TEMP}/${RELEASE_ARCHIVE}"
          du -h "${RUNNER_TEMP}/${RELEASE_ARCHIVE}"

      - name: Inspect archive contents
        shell: bash
        run: |
          set -euo pipefail

          tar -tzf "${RUNNER_TEMP}/${RELEASE_ARCHIVE}" > "${RUNNER_TEMP}/archive-contents.txt"
          head -200 "${RUNNER_TEMP}/archive-contents.txt"


      - name: Upload release archive
        shell: bash
        run: |
          set -euo pipefail
      
          scp \
            -vv \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=3 \
            -o TCPKeepAlive=yes \
            -i ~/.ssh/deploy_key \
            -P "${SERVER_PORT}" \
            "${RUNNER_TEMP}/${RELEASE_ARCHIVE}" \
            "${SERVER_USER}@${SERVER_HOST}:/tmp/${RELEASE_ARCHIVE}"

      - name: Deploy on server
        shell: bash
        run: |
          set -euo pipefail

          ssh \
            -i ~/.ssh/deploy_key \
            -p "${SERVER_PORT}" \
            "${SERVER_USER}@${SERVER_HOST}" \
            "bash -s -- '${SERVER_PATH}' '${SYSTEMD_SERVICE}' '/tmp/${RELEASE_ARCHIVE}' '${RELEASE_ID}'" \
            < scripts/deploy-remote.sh
