name: Deploy To Server

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '20'
      SERVER_PATH: /app/ai-code/brainstorm
      SYSTEMD_SERVICE: brainstorm.service
      RELEASE_ARCHIVE: orblog-release.tgz
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      SERVER_USER: ${{ secrets.SERVER_USER }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --runInBand

      - name: Build application
        run: npm run build

      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail

          install -m 700 -d ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SERVER_PORT}" -H "${SERVER_HOST}" >> ~/.ssh/known_hosts

      - name: Create release archive
        shell: bash
        run: |
          set -euo pipefail

          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='.env.production.local' \
            --exclude='prisma/*.db' \
            --exclude='prisma/*.db-journal' \
            --exclude='playwright-report' \
            --exclude='test-results' \
            --exclude='coverage' \
            --exclude='playwright/.cache' \
            --exclude='*.log' \
            -czf "${RUNNER_TEMP}/${RELEASE_ARCHIVE}" \
            .

      - name: Upload release archive
        shell: bash
        run: |
          set -euo pipefail

          scp \
            -i ~/.ssh/deploy_key \
            -P "${SERVER_PORT}" \
            "${RUNNER_TEMP}/${RELEASE_ARCHIVE}" \
            "${SERVER_USER}@${SERVER_HOST}:/tmp/${RELEASE_ARCHIVE}"

      - name: Deploy on server
        shell: bash
        run: |
          set -euo pipefail

          ssh \
            -i ~/.ssh/deploy_key \
            -p "${SERVER_PORT}" \
            "${SERVER_USER}@${SERVER_HOST}" \
            "bash -s -- '${SERVER_PATH}' '${SYSTEMD_SERVICE}' '/tmp/${RELEASE_ARCHIVE}'" \
            < scripts/deploy-remote.sh
